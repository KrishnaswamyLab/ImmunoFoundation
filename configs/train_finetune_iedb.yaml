data:
  # source CSV used by scripts/build_iedb_splits.py — not read at training time
  csv_path: data/IEDB/merged_af3.csv
  split_csv_paths:
    train: data/IEDB/splits/train.csv
    val: data/IEDB/splits/val.csv
    test: data/IEDB/splits/test.csv
  mono: false
  finetune: true
  use_cached_embeddings: false  # if true, load precomputed backbone embeddings (run scripts/precompute_backbone.py first)
  seed: 0
  batch_size: 32
  max_batch_size: 32
  num_workers: 0
  prefetch_factor: 100
  mask:
    mask_rate: 0.0
    max_distance: 8
    max_neighbors: 12
  structure:
    adj: true
    graph_type: knn
    k: 15

model:
  sequence:
    model_type: esm
    freeze_esm: true
    aggregate: false
    esm_dim: 1280
    rep_layer: 33
    esm_variant: esm2_t33_650M_UR50D
    out_dim: 32
    n_heads: 8
    dim_ffn: 256
    n_layers: 10
  structure:
    model_type: transformer
    out_dim: 32
    n_heads: 8
    dim_ffn: 256
    n_layers: 4
  fusion:
    dim: 32
    n_heads: 4
    dim_ffn: 128
    n_layers: 2
    dropout: 0.1
  pos_weight: null
  freeze_backbone: false  # if true, freeze sequence_model + structure_model — only fusion + head train
  optimizer:
    lr: 1.0e-4
    weight_decay: 1.0e-6

init_checkpoint: /nfs/roberts/project/pi_sk2433/shared/ImmunoFoundationCkpt/phase2/epoch=15-step=5040.ckpt

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-6

experiment:
  debug: false
  num_devices: 1

  wandb:
    name: "iedb_finetune_seed${data.seed}"
    project: immunofoundation
    save_code: false
    tags: ["finetune", "iedb"]
    mode: online

  trainer:
    min_epochs: 1
    max_epochs: 50
    accelerator: gpu
    log_every_n_steps: 10
    deterministic: false
    strategy: auto
    check_val_every_n_epoch: 1
    accumulate_grad_batches: 2

  checkpointer:
    dirpath: ckpt/${experiment.wandb.project}/${experiment.wandb.name}
    save_last: true
    save_top_k: 1
    monitor: val/auprc
    mode: max
    every_n_epochs: 1
