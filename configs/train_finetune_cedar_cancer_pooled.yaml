data:
  csv_path: data/ImmunoStruct_CEDAR_data_cancer.csv
  split_csv_paths:
    train: data/CEDAR_cancer/splits_seed${data.seed}/train.csv
    val: data/CEDAR_cancer/splits_seed${data.seed}/val.csv
    test: data/CEDAR_cancer/splits_seed${data.seed}/test.csv
  cache_subdir: cedar_cancer_finetune
  mono: false
  finetune: true
  use_cached_embeddings: true     # baseline reuses precomputed backbone embeddings (5,396 entries)
  contrastive_wildtype: true      # also load wildtype peptide-MHC complex per row
  seed: 0
  batch_size: 128
  max_batch_size: 128
  num_workers: 0
  prefetch_factor: 100
  mask:
    mask_rate: 0.0
    max_distance: 8
    max_neighbors: 12
  structure:
    adj: true
    graph_type: knn
    k: 15
    peptide_chain: B              # CEDAR cancer AF2 PDBs use chain B for peptide
    mhc_chain: A

model:
  sequence:
    model_type: esm
    freeze_esm: true
    aggregate: false
    esm_dim: 1280
    rep_layer: 33
    esm_variant: esm2_t33_650M_UR50D
    out_dim: 32
    n_heads: 8
    dim_ffn: 256
    n_layers: 10
  structure:
    model_type: transformer
    out_dim: 32
    n_heads: 8
    dim_ffn: 256
    n_layers: 4
  fusion:
    # `dim` is reused as the per-modality embedding width (=4*dim total after pool+concat).
    dim: 32
    n_heads: 4
    dim_ffn: 128
    n_layers: 2
    dropout: 0.1
  aggregator: pool                # pool | fusion
  head:
    hidden_dim: 64
    dropout: 0.1
  pos_weight: null
  freeze_backbone: true           # cached embeddings only valid when backbone frozen
  loss_type: bce
  contrastive:
    enabled: true                 # CW contrastive on the MLP-hidden representation
    lambda_cw: 0.1
    lambda_off_diag: 0.01
  optimizer:
    lr: 1.0e-3
    weight_decay: 1.0e-6

init_checkpoint: /nfs/roberts/project/pi_sk2433/shared/ImmunoFoundationCkpt/phase2/epoch=15-step=5040.ckpt

optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-6

experiment:
  debug: false
  num_devices: 1

  wandb:
    name: "cedar_cancer_pooled_seed${data.seed}"
    project: immunofoundation
    save_code: false
    tags: ["finetune", "cedar_cancer", "pooled"]
    mode: online

  trainer:
    min_epochs: 1
    max_epochs: 300
    accelerator: gpu
    log_every_n_steps: 10
    deterministic: false
    strategy: auto
    check_val_every_n_epoch: 1
    accumulate_grad_batches: 1

  checkpointer:
    dirpath: ckpt/${experiment.wandb.project}/${experiment.wandb.name}
    save_last: true
    save_top_k: 1
    monitor: val/auprc
    mode: max
    every_n_epochs: 1
