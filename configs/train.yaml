

data:

model:
  sequence:
    in_dim: 32
    out_dim: 32

experiment:
  debug: False
  num_devices: 1

  wandb:
    name: null
    project: immunofoundation
    save_code: false
    tags: []
    mode: "online" # can also save to `offline`

  optimizer:
    lr: 0.0001

  trainer:
    min_epochs: 1
    max_epochs: 200
    accelerator: gpu
    log_every_n_steps: 1
    deterministic: False
    strategy: ddp #ddp
    check_val_every_n_epoch: 20
    accumulate_grad_batches: 4

  checkpointer:
    dirpath: ckpt/${experiment.wandb.project}/${experiment.wandb.name}/
    save_last: True
    save_top_k: 3
    monitor: train/loss
    mode: min
    every_n_epochs: 40