data: null
model:
  sequence:
    in_dim: 32
    out_dim: 32
experiment:
  trainer:
    min_epochs: 1
    max_epochs: 200
    accelerator: gpu
    log_every_n_steps: 1
    deterministic: false
    strategy: ddp
    check_val_every_n_epoch: 20
    accumulate_grad_batches: 4
  checkpointer:
    dirpath: ckpt/${experiment.wandb.project}/${experiment.wandb.name}/
    save_last: true
    save_top_k: 3
    monitor: train/loss
    mode: min
    every_n_epochs: 40
